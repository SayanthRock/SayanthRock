# ──────────────────────────────────────────────────────────────
#  SayanthRock — GitHub Pages Deployment
#  Deploys the static site on every push to main
# ──────────────────────────────────────────────────────────────

name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:          # allow manual trigger from Actions tab

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false   # let in-progress deploys finish

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️  Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦  Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."           # root of repo — change to "./dist" if you build first

      - name: 🌐  Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
